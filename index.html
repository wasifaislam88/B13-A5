<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<title>GitHub Issue Tracker</title>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">
<main class="bg-white p-8 rounded-xl shadow-md w-80 hover:scale-105 transition hover:bg-gray-100 hover:border ">

  <div class="text-center mb-6">
     <img src="./assets/github-logo.png" alt="GitHub" class="mx-auto w-16">
     <h1 class="text-xl font-bold mt-3">GitHub Issues Tracker</h1>
     <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
  </div>

<form class="flex flex-col gap-2">
    
    <label class="text-sm font-medium">Username</label>
    <input id="userName" type="text" placeholder="Enter Username" class="input input-bordered w-full">
    
    <p class="text-xs text-gray-400">Default: admin</p>
    
    <label class="text-sm font-medium">Password</label>
    <input id="userPassword" type="password" placeholder="Enter Password" class="input input-bordered w-full" >
    
    <p class="text-xs text-gray-500">Default: admin123</p>
    
    <button id="loginBtn" class="btn btn-primary w-full mt-2">Sign In</button>

</form>

<div class="divider">OR</div>

<footer class="text-center text-sm">
<p class="font-semibold">Demo Credentials</p>
<p><span class="font-medium">Username:</span> admin</p>
<p><span class="font-medium">Password:</span> admin123</p>
</footer>

</main>

<script src="./script/index.js"></script>
</body>
</html>
